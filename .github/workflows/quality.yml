name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  full-windows:
    name: Full / Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Node dependencies
        shell: pwsh
        run: pwsh -NoProfile -File scripts/bootstrap.ps1 -Component Node
      - name: Prepare Maven dependencies
        shell: pwsh
        run: pwsh -NoProfile -File scripts/bootstrap.ps1 -Component Maven
      - name: Run Full
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check.ps1 -Mode Full

  full-linux:
    name: Full / Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Node dependencies
        run: pwsh -NoProfile -File scripts/bootstrap.ps1 -Component Node
      - name: Prepare Maven dependencies
        run: pwsh -NoProfile -File scripts/bootstrap.ps1 -Component Maven
      - name: Run Full
        run: pwsh -NoProfile -File scripts/check.ps1 -Mode Full

  coverage-frontend:
    name: Coverage / Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
      - name: Install Node dependencies
        run: pwsh -NoProfile -File scripts/bootstrap.ps1 -Component Node
      - name: Run frontend coverage
        run: pwsh -NoProfile -File scripts/check.ps1 -CiTask FrontendCoverage
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
      - name: Install Node dependencies and browser
        run: |
          pwsh -NoProfile -File scripts/bootstrap.ps1 -Component Node
          pwsh -NoProfile -File scripts/bootstrap.ps1 -Component Playwright
      - name: Run E2E
        run: pwsh -NoProfile -File scripts/check.ps1 -CiTask E2E
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

  gitleaks-directory:
    name: Gitleaks / Directory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Install pinned Gitleaks
        run: pwsh -NoProfile -File scripts/bootstrap.ps1 -Component Gitleaks
      - name: Scan repository directory
        run: pwsh -NoProfile -File scripts/check.ps1 -CiTask DirectorySecrets
