spring:
  application:
    name: daily-report
  datasource:
    url: ${DAILY_REPORT_DB_URL:jdbc:oracle:thin:@//localhost:1521/ORCL}
    username: ${DAILY_REPORT_DB_USER}
    password: ${DAILY_REPORT_DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: ${SESSION_COOKIE_SECURE:true}
logging:
  level:
    root: WARN
    com.example.dailyreport: INFO
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"
