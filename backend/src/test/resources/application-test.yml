spring:
  datasource:
    url: ${DAILY_REPORT_DB_URL:jdbc:oracle:thin:@//localhost:1521/ORCL}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DAILY_REPORT_DB_USER}
    password: ${DAILY_REPORT_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: false
